name: Build and Deploy

on:
    push:
        branches: [ master ]

env:
    IMAGE_NAME: chromino

jobs:
    build:
        name: Build & Push Image to ACR
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Alibaba Cloud Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ vars.DEPLOY_REGISTRY_URL }}
                  username: ${{ vars.DEPLOY_REGISTRY_USERNAME }}
                  password: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ vars.DEPLOY_REGISTRY_URL }}/${{ vars.DEPLOY_REGISTRY_NAMESPACE}}/${{
                      env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=master-
                      type=raw,value=latest

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy to Server
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              env:
                  DEPLOY_REGISTRY_URL: ${{ vars.DEPLOY_REGISTRY_URL }}
                  DEPLOY_REGISTRY_NAMESPACE: ${{ vars.DEPLOY_REGISTRY_NAMESPACE }}
                  DEPLOY_REGISTRY_USERNAME: ${{ vars.DEPLOY_REGISTRY_USERNAME }}
                  DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
                  GITHUB_SHA: ${{ github.sha }}
              with:
                  host: ${{ vars.SSH_HOST }}
                  username: ${{ vars.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  envs: DEPLOY_REGISTRY_URL,DEPLOY_REGISTRY_NAMESPACE,DEPLOY_REGISTRY_USERNAME,DEPLOY_REGISTRY_PASSWORD,GITHUB_SHA
                  script: |
                      set -e

                      REPO_URL="git@github.com:hansenz42/chromino.git"
                      REPO_DIR="$HOME/repo/chromino"
                      BRANCH="master"

                      # Clone or pull repo
                      if [ -d "$REPO_DIR" ]; then
                        echo "Repository exists, updating..."
                        cd "$REPO_DIR"
                        git fetch origin
                        git checkout $BRANCH
                        git pull origin $BRANCH
                      else
                        echo "Cloning repository..."
                        mkdir -p "$HOME/repo"
                        git clone -b $BRANCH "$REPO_URL" "$REPO_DIR"
                        cd "$REPO_DIR"
                      fi

                      # Login to ACR
                      echo "$DEPLOY_REGISTRY_PASSWORD" | podman login "$DEPLOY_REGISTRY_URL" \
                        -u "$DEPLOY_REGISTRY_USERNAME" --password-stdin

                      # Export image tag so docker-compose.yml picks it up
                      export CHROMINO_IMAGE="${DEPLOY_REGISTRY_URL}/${DEPLOY_REGISTRY_NAMESPACE}/chromino:master-${GITHUB_SHA::7}"

                      # Deploy
                      chmod +x deploy.sh
                      ./deploy.sh
