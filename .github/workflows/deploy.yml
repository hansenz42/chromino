name: Build and Deploy

on:
    push:
        branches: [ main ]

env:
    IMAGE: ghcr.io/hansenz42/chromino

jobs:
    build:
        name: Build & Push Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.IMAGE }}:latest
                      ${{ env.IMAGE }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy to Server
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  envs: GITHUB_TOKEN,GITHUB_ACTOR
                  script: |
                      set -e

                      IMAGE="ghcr.io/hansenz42/chromino:${{ github.sha }}"
                      DEPLOY_DIR="/opt/chromino"

                      mkdir -p "$DEPLOY_DIR"

                      # 登录 ghcr.io
                      echo "$GITHUB_TOKEN" | podman login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

                      # 拉取最新镜像
                      podman pull "$IMAGE"

                      # 写入 docker-compose.yml（不含 build 指令，直接使用预构建镜像）
                      cat > "$DEPLOY_DIR/docker-compose.yml" << EOF
                      services:
                        chromino:
                          container_name: chromino
                          image: $IMAGE
                          depends_on:
                            redis:
                              condition: service_healthy
                          ports:
                            - "3031:3031"
                          env_file:
                            - .env
                          environment:
                            NODE_ENV: production
                            PORT: 3031
                            REDIS_URL: redis://redis:6379
                          restart: unless-stopped

                        redis:
                          container_name: chromino-redis
                          image: redis:7-alpine
                          command: ["redis-server", "--appendonly", "yes"]
                          healthcheck:
                            test: ["CMD", "redis-cli", "ping"]
                            interval: 5s
                            timeout: 3s
                            retries: 10
                          volumes:
                            - redis-data:/data
                          restart: unless-stopped

                      volumes:
                        redis-data:
                      EOF

                      # 重新部署
                      cd "$DEPLOY_DIR"
                      podman-compose up -d
