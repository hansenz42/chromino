services:
  chromino:
    container_name: chromino
    image: registry.cn-hangzhou.aliyuncs.com/assen-private/chromino:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3031:3031"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3031
      REDIS_URL: redis://redis:6379
    restart: unless-stopped

  redis:
    container_name: chromino-redis
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
